<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARIA Role Implementation</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1 role="heading">My Portfolio</h1>

    <nav role="navigation">
        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#">Projects</a>
        <a href="#">Contact</a>
    </nav>

    <img
        role="img"
        src="profile.jpg"
        alt="Profile picture of the portfolio owner"
    >

    <p>
        Hello! My name is Rahul. I am a web development enthusiast learning HTML,
        CSS, and JavaScript. I enjoy building websites and improving my programming skills.
    </p>

    <ul role="list">
        <li role="listitem">HTML</li>
        <li role="listitem">CSS</li>
        <li role="listitem">JavaScript</li>
        <li role="listitem">React</li>
        <li role="listitem">GitHub</li>
    </ul>
</body>
</html>
